<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FateLoop — AI × Chinese Mysticism</title>
    <meta name="description" content="AI-powered relationship analysis meets ancient Chinese wisdom." />
    <meta property="og:title" content="FateLoop — AI × Chinese Mysticism" />

    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      #loading-fallback {
        position: fixed; inset: 0; background: #050505;
        display: flex; align-items: center; justify-content: center;
        font-family: 'DM Sans', sans-serif; color: #444; font-size: 13px;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-fallback">Loading FateLoop...</div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide loading text once React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('loading-fallback');
          if (el) el.style.display = 'none';
        }, 3000);
      });
    </script>
  </body>
